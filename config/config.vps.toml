# ed2k-server — VPS PUBLIC DEPLOYMENT config
# Copy to /etc/ed2k-server/config.toml and edit the fields marked CHANGE_ME

[server]
name = "CHANGE_ME"              # Your server name shown in eMule server list
desc = "CHANGE_ME"              # Description
public = false                  # Set to true ONLY after getting content_filter configured

# Your VPS public IP — clients see this in SERVERIDENT
this_ip = "CHANGE_ME"          # e.g. "65.109.199.83"

# Well-known seed servers — your server will query them on startup
# to get a list of active eD2k servers. Eventually other servers
# will discover yours and add it to their lists.
seed_servers = [
"45.87.41.16:6262",
"213.252.245.239:43333",
"185.25.48.89:18357",
"147.78.0.252:18357",
"37.143.128.252:47111",
