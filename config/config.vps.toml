version_major = 18
version_minor = 1

[network]
tcp_port = 4661
udp_port = 4665
listen_ip = "0.0.0.0"          # DO NOT change to your VPS IP — 0.0.0.0 is correct
listen_backlog = 1024
max_frame_size = 1_000_000
login_timeout_ms = 3000         # Slightly longer for VPS latency
support_crypt = true

[limits]
max_clients = 5000
soft_limit_files = 5000
hard_limit_files = 7500
max_clients_per_ip = 10
max_string_size = 250
ping_delay_seconds = 300

[content_filter]
# Leave empty until you get hash list from Project Arachnid / IWF
hash_blocklists = ["/etc/ed2k-server/csam_hashes.txt"]
# Uncomment and add your hash list file once you receive it:
# hash_blocklists = ["/etc/ed2k-server/csam_hashes.txt"]
extra_terms_file = "/etc/ed2k-server/csam_terms_extra.txt"
jargon_terms_file = "/etc/ed2k-server/csam_jargon.txt"
publisher_attempt_disconnect_threshold = 3
publisher_blacklist_seconds = 2592000   # 30 days

[welcome]
messages = [
    "Welcome to CHANGE_ME",
]

[log]
level = "warn"
connection_trace = false        # Set to true only for debugging

[storage]
ipfilter_path = "/etc/ed2k-server/guarding.p2p"
country_db_path = "/etc/ed2k-server/ip-to-country.csv"

[admin]
enabled = true
port = 8080