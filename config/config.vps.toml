"223.165.4.251:42011",
"91.148.135.254:9197",
"91.148.135.252:47111",
"91.148.135.253:18357",
"57.128.161.24:6666",
"91.208.162.182:4232",
"45.82.80.155:5687",
"91.208.162.87:4232",
